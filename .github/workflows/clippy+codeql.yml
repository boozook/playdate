name: Clippy Ql
on:
  workflow_call:
    inputs:
      ref:
        description: git branch, tag or SHA to checkout.
        type: string
        required: true
  workflow_dispatch:
    inputs:
      ref:
        default: ""
        description: git branch, tag or SHA to checkout.
        type: string
        required: false
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master, ci/clippy-codeql-workflow]
env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  CARGO_TERM_COLOR: never
  CARGO_TERM_PROGRESS_WHEN: never
  # RUST_LOG: trace
jobs:
  clippy-codeql:
    name: Clippy (${{ matrix.os.name }}) QL
    if: branch == 'main'
    defaults:
      run:
        shell: bash
    permissions:
      actions: read
      contents: read
      security-events: write
    runs-on: ${{ matrix.os.key }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - { name: mac, key: macos-14 }
          - { name: win, key: windows-latest }
          - { name: linux, key: ubuntu-latest }
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install Clippy
        run: rustup component add clippy

      - name: Config
        uses: ./.github/actions/init-cfg

      - name: Install Deps
        uses: ./.github/actions/tools-deps

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-deduplicate-warnings
        run: cargo binstall cargo-deduplicate-warnings

      - name: Install sarif
        # run: cargo install clippy-sarif sarif-fmt
        run: cargo binstall clippy-sarif sarif-fmt

      - name: Clippy -> Sarif
        continue-on-error: true
        run: >-
          cargo clippy
          -p=cargo-playdate
          -p=playdate-bindgen
          -p=playdate-bindgen-cfg
          -p=playdate-build
          -p=playdate-device
          -p=playdate-simulator-utils
          -p=playdate-build-utils
          -p=playdate-tool
          --bins --examples --all-targets
          --message-format=json | cargo deduplicate-warnings | clippy-sarif | tee results.sarif | sarif-fmt

      - name: Upload CodeQl
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          wait-for-processing: true
